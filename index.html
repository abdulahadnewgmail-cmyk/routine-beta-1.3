<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>রুটিন পরিবর্তন - সময় ও রুটিন</title>
    <link rel="stylesheet" href="table.css">
    <link rel="stylesheet" href="header.css">
    <style>
        /* সরাসরি এখানে কিছু ফিক্সড স্টাইল দিচ্ছি যাতে হেডারের নিচে গ্যাপ থাকে */
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a; /* তোমার অ্যাপের ব্যাকগ্রাউন্ড কালার অনুযায়ী */
        }
        main {
            margin-top: 100px; /* হেডারের উচ্চতা অনুযায়ী গ্যাপ */
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .p {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1rem;
        }
        .tableContainer {
            width: 100%;
            overflow-x: auto; /* মোবাইল স্ক্রিনে টেবিল স্ক্রল করার জন্য */
            margin-bottom: 30px;
        }
        .save_reset_routine {
            display: flex;
            gap: 15px;
            justify-content: center;
            width: 100%;
            padding-bottom: 50px;
        }
        button {
            padding: 12px 25px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .save_routine {
            background-color: #2ecc71;
            color: white;
        }
        .reset_routine {
            background-color: #e74c3c;
            color: white;
        }
    </style>
</head>
<body>

    <header>  
        <div class="menu">
          <a href="index.html" style="text-decoration: none; color: white; font-size: 1.5rem;">
            &#8656;
          </a>
        </div>
        <div class="app_name">রুটিন পরিবর্তন</div>
        
        <div class="profile">
          <div class="uid">Abdul Ahad</div>
          <div class="profile_pic">
            <p class="demo_profile_pic">🧑🏻‍💼</p>
          </div>
        </div>
    </header>

    <main>
        <p class="p">
            রুটিন পরিবর্তন করতে সাবজেক্ট এর ঘরে আপনার কাঙ্খিত সাবজেক্টের নাম লিখে <br>
            <strong>সেভ</strong> বাটনে ক্লিক করুন।
        </p>
        
        <div class="tableContainer">
            <table>
                </table>
        </div>
       
        <div class="save_reset_routine">
            <button class="reset_routine" onclick="resetRoutine()">Reset Routine</button>
            <button class="save_routine" onclick="saveRoutine()">Save Changes</button>
        </div>
    </main>

    <script src="data_r.js"></script>
    <script src="table.js"></script>
    <script>
      // Service Worker registration
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('SW Registered'))
            .catch(err => console.log('SW Error: ', err));
        });
      }
    </script>
</body>
  </html>
